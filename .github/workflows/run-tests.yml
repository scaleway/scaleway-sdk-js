name: Run Tests

on:
  push:
    branches:
      - main
  pull_request:
  merge_group:

jobs:
  typecheck:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0
      - name: Use Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: .nvmrc
          check-latest: true
          cache: 'pnpm'
      - run: make install-dependencies
      # need to build tools and install to make the bin available
      - run: pnpm turbo build "--filter=./tools/*"
      - run: rm -rf node_modules && pnpm install
      - run: make typing

  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0
      - name: Use Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: .nvmrc
          check-latest: true
          cache: 'pnpm'
      - run:
          make install-dependencies
          # need to build tools and install to make the bin available
      - run: pnpm turbo build "--filter=./tools/*"
      - run: rm -rf node_modules && pnpm install
      - run: make build
      - run: pnpm run lint

  test:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        test-environment:
          - node
          - jsdom
        node:
          - '24'
          - '26'
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0
      - name: Use Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ matrix.node }}
          check-latest: true
          cache: 'pnpm'
      - run:
          make install-dependencies
          # need to build tools and install to make the bin available
      - run: pnpm turbo build "--filter=./tools/*" --force
      # relinks bins without reinstalling
      - run: rm -rf node_modules && pnpm install
      - run: make build
      - run: pnpm run test:coverage --environment ${{ matrix.test-environment }}
      - uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5.5.2
      - run: pnpm run test:junit
      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@0fa95f0e1eeaafde2c782583b36b28ad0d8c77d3 # v1.2.1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
