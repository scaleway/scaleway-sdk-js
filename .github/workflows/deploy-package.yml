name: Deploy to NPM

on:
  workflow_dispatch:
  schedule:
    - cron: '0 12 * * MON'

permissions:
  contents: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-24.04
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: '0'
          persist-credentials: false
          token: ${{ secrets.GH_TOKEN }}
      - run: git fetch --depth=1 origin +refs/tags/*:refs/tags/*

      - name: Configure SSH signing
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_SIGNING_PRIVATE_KEY }}" > ~/.ssh/signing_key
          chmod 600 ~/.ssh/signing_key
          git config --global gpg.format ssh
          git config --global user.signingkey ~/.ssh/signing_key
          git config --global commit.gpgsign true
          git config --global tag.gpgsign true

      - name: Git Identity
        run: |
          git config --global user.name 'scaleway-bot'
          git config --global user.email 'github@scaleway.com'
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/$GITHUB_REPOSITORY
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
      - uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0

      - name: Use Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          registry-url: 'https://registry.npmjs.org/'
          node-version: 20.19.6
          check-latest: true
      - run: pnpm install
      # need to build tools and install to make tools bin(s) available
      - run: pnpm turbo build "--filter=./tools/*"
      - run: pnpm install
      - run: pnpm run build

      - name: Version package with lerna
        run: pnpm lerna version -y --no-private --force-git-tag --create-release github
        env:
          HUSKY: 0
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      # https://docs.github.com/en/actions/use-cases-and-examples/publishing-packages/publishing-nodejs-packages#publishing-packages-to-the-npm-registry
      # npm may auto-enable provenance in GHA (OIDC); without Trusted Publishing configured on
      # npmjs.com for this repo, publish can fail with a misleading 404 on PUT. Use the classic token.
      - name: Publish to npm
        run: pnpm -r publish --access public --tag latest
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "false"

      - name: Notify Slack on success
        if: success()
        continue-on-error: true
        run: |
          curl -fsS -X POST -H 'Content-type: application/json' \
          --data '{
            "blocks": [
              {
                "type": "header",
                "text": {
                  "type": "plain_text",
                  "text": "scaleway-sdk-js released to npm"
                }
              },
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": ":white_check_mark: The npm deployment completed successfully."
                }
              },
              {
                "type": "section",
                "fields": [
                  {
                    "type": "mrkdwn",
                    "text": "*Repository:*\n${{ github.repository }}"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*Branch:*\n${{ github.ref_name }}"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*Triggered by:*\n${{ github.actor }}"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*Run:*\n<https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|Open workflow run>"
                  }
                ]
              },
              {
                "type": "context",
                "elements": [
                  {
                    "type": "mrkdwn",
                    "text": "GitHub releases were created by the deploy workflow."
                  }
                ]
              }
            ]
          }' \
          "${SLACK_WEBHOOK_SDK_DEPLOY}"
        env:
          SLACK_WEBHOOK_SDK_DEPLOY: ${{ secrets.SLACK_WEBHOOK_SDK_DEPLOY }}

      - name: Notify Slack on failure
        if: failure()
        continue-on-error: true
        run: |
          curl -fsS -X POST -H 'Content-type: application/json' \
          --data '{
            "blocks": [
              {
                "type": "header",
                "text": {
                  "type": "plain_text",
                  "text": "scaleway-sdk-js npm deploy failed"
                }
              },
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": ":x: The release could not be published to npm."
                }
              },
              {
                "type": "section",
                "fields": [
                  {
                    "type": "mrkdwn",
                    "text": "*Repository:*\n${{ github.repository }}"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*Branch:*\n${{ github.ref_name }}"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*Triggered by:*\n${{ github.actor }}"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*Run:*\n<https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|Open workflow run>"
                  }
                }
              }
            ]
          }' \
          "${SLACK_WEBHOOK_SDK_DEPLOY}"
        env:
          SLACK_WEBHOOK_SDK_DEPLOY: ${{ secrets.SLACK_WEBHOOK_SDK_DEPLOY }}
